# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish to PyPI

# Build + publish on a version tag (e.g. v0.1.0). Publishing uses PyPI
# Trusted Publishing (OIDC) — no API token is stored in the repo.
# One-time setup on pypi.org: add a Trusted Publisher for project
# "cyberboard-cli" with owner GeneralD, repo cyberboard-cli, workflow
# "publish.yml", environment "pypi" (and create that environment in the
# repo's Settings -> Environments).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match pyproject version $ver"
            exit 1
          fi
          echo "Releasing version $ver"
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cyberboard-cli
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
